<ion-header>
  <ion-toolbar>
    <ion-title>Venta de Videojuegos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>
    <ion-item *ngFor="let serie of videojuegos" class="card-juego">
      <ion-label>
        <h2>{{ serie.titulo }}</h2>
        <img [src]="serie.portada" alt="{{ serie.titulo }}" style="max-width: 100px; max-height: 100px; justify-items: center;">
        <!-- AUDIO -->
        <div *ngIf="serie.audio">
          <audio controls [src]="serie.audio">
            Tu navegador no soporta audio.
          </audio>
        </div>
        <p>{{ serie.categoria }}</p>
        <p>{{ serie.descripcion }}</p>         
        <ion-button
        *ngIf="serie.link_referencia"
        (click)="mostrarVideo(serie.link_referencia)">
          Ver trailer
        </ion-button>

        <div *ngIf="videoUrl === serie.link_referencia">
          <iframe
            width="100%"
            height="200"
            [src]="getVideoUrl(serie.link_referencia)"
            frameborder="0"
            allowfullscreen>
          </iframe>
        </div>

        <!-- BOTÓN MOSTRAR -->
        <ion-button
          *ngIf="serie.imagen"
          (click)="toggleImagen(serie.id!)"
          color="secondary"
        >
          {{ imagenVisible === serie.id ? 'Ocultar Imagen' : 'Ver Imagen' }}
        </ion-button>

        <!-- IMAGEN -->
        <div *ngIf="imagenVisible === serie.id">
          <img
            [src]="serie.imagen"
            style="
              width: 100%;
              max-width: 300px;
              margin-top: 10px;
              border-radius: 10px;
            "
          >
        </div>
      </ion-label>

      <div class="acciones">
        <ion-button [routerLink]="['/videojuegos-form', serie.id]">
          Editar
        </ion-button>

        <ion-button (click)="eliminar(serie.id!)">
          Eliminar
        </ion-button>
      </div>

    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/videojuegos-form">
      +
    </ion-fab-button>
  </ion-fab>

</ion-content>
